<!DOCTYPE html>
<html lang="ja" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>利用規約 - AI Code Builder</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root[data-theme="dark"] {
            --bg: #0f111a;
            --text: #e2e8f0;
            --surface: #1e2130;
            --border: #2d3142;
            --primary: #6366f1;
        }
        :root[data-theme="light"] {
            --bg: #f8fafc;
            --text: #1e293b;
            --surface: #ffffff;
            --border: #e2e8f0;
            --primary: #4f46e5;
        }
        * { box-sizing: border-box; }
        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
            margin: 0;
            padding: 40px 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: var(--surface);
            padding: 40px;
            border-radius: 12px;
            border: 1px solid var(--border);
        }
        h1 { margin-top: 0; color: var(--primary); }
        h3 { margin-top: 24px; border-bottom: 1px solid var(--border); padding-bottom: 8px; }
        p { margin-bottom: 16px; color: var(--text); opacity: 0.9; }
        .back-btn {
            display: inline-block;
            margin-bottom: 24px;
            color: var(--primary);
            text-decoration: none;
            font-weight: 500;
        }
        .back-btn:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="container">
        <a href="index.html" class="back-btn">&larr; アプリに戻る</a>
        <h1>AI Code Builder 利用規約</h1>
        <p>本利用規約（以下「本規約」といいます。）は、AI Code Builder（以下「本サービス」といいます。）の利用条件を定めるものです。</p>

        <script>
            // 30条分の規約を動的に生成
            const container = document.querySelector('.container');
            const contents = [
                "本規約は、本サービスの利用に関する条件を定めるものです。",
                "ユーザーは、本規約に同意した上で本サービスを利用するものとします。",
                "未成年者が本サービスを利用する場合、法定代理人の同意を得るものとします。",
                "ユーザーは、登録情報に変更があった場合、速やかに変更手続きを行うものとします。",
                "ユーザーは、自己の責任においてAPIキー等の認証情報を適切に管理するものとします。",
                "認証情報の管理不十分による損害について、当方は一切の責任を負いません。",
                "ユーザーは、本サービスの利用にあたり、法令または公序良俗に違反する行為をしてはなりません。",
                "本サービスによって生成されたコードの著作権および使用権は、ユーザーに帰属します。",
                "生成されたコードに起因するバグや脆弱性について、当方は保証いたしません。",
                "当方は、本サービスの提供を事前の通知なく変更または終了することができます。",
                "本サービスは、現状有姿で提供されるものであり、完全性や正確性を保証するものではありません。",
                "ユーザーは、他者の知的財産権を侵害するようなプロンプトを入力してはなりません。",
                "当方は、ユーザーが本規約に違反した場合、サービスの利用を停止させることができます。",
                "本サービスの利用に関連してユーザーに発生した損害について、当方は故意または重過失がない限り責任を負いません。",
                "ユーザーは、本サービスを利用してマルウェアや悪意のあるソフトウェアを作成してはなりません。",
                "本サービスは外部のAI APIを利用しており、当該APIの稼働状況によりサービスが影響を受けることがあります。",
                "ユーザーのデータはローカルブラウザ（IndexedDB等）に保存され、当方はこれを収集しません。",
                "ただし、生成のプロセスにおいて入力データは外部AIプロバイダーへ送信されます。",
                "ユーザーは、機密情報や個人情報をプロンプトに含めないよう注意するものとします。",
                "当方は、本サービスの保守またはアップデートのために一時的にサービスを停止することがあります。",
                "本サービスに関連する商標、ロゴ等の権利は当方または正当な権利者に帰属します。",
                "ユーザーは、本規約の地位または権利義務を第三者に譲渡することはできません。",
                "当方は、必要と判断した場合には、ユーザーに通知することなく本規約を変更することができます。",
                "本規約の変更後、ユーザーが本サービスを利用した場合、変更後の規約に同意したものとみなします。",
                "本規約のいずれかの条項が無効と判断された場合であっても、他の条項は継続して効力を有します。",
                "本サービスに関するお問い合わせは、指定のフォームまたはメールアドレスにて受け付けます。",
                "本サービスに起因する紛争については、当方の所在地を管轄する裁判所を専属的合意管轄とします。",
                "本規約は日本法に準拠し、解釈されるものとします。",
                "不可抗力（天災、戦争、テロ、通信障害等）による債務不履行について、当方は責任を免れるものとします。",
                "本規約に定めのない事項については、当方およびユーザーは誠意をもって協議し解決するものとします。"
            ];
            contents.forEach((text, i) => {
                const article = document.createElement('div');
                article.innerHTML = `<h3>第${i + 1}条</h3><p>${text}</p>`;
                container.appendChild(article);
            });
        </script>
    </div>
</body>
</html>
